<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Chatbot IA - by Gemma</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 650px;
      margin: 40px auto;
      padding: 0 20px;
      background-color: #f0f4f8;
    }
    h2 { color: #1565C0; text-align: center; }
    #chat {
      background: white;
      border: 1px solid #ccc;
      border-radius: 12px;
      height: 350px;
      overflow-y: auto;
      padding: 16px;
      margin-bottom: 12px;
}
    .usuario { color: #1565C0; margin: 8px 0; }
    .bot     { color: #2E7D32; margin: 8px 0; }
    .controles { display: flex; gap: 8px; }
    input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
    }
    button {
      padding: 10px 18px;
      background: #1565C0;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
    }
    button:hover { background: #0D47A1; }
  </style>
</head>
<body>
  <h2>🤖 Mi asistente IA - by Gemma</h2>
  <div id="chat"></div>
  <div class="controles">
    <input id="entrada" placeholder="Escribe tu pregunta aqui..." />
    <button onclick="enviar()">Enviar</button>
  </div>

  <script>
    // Personalidad del chatbot (cambiar en Sesion 2)
    const personalidad = "Eres un asistente de transporte de mercancías internacional. Respondes en español, de forma breve.";

    // Funcion principal: se llama al pulsar Enviar
    async function enviar() {
      const texto = document.getElementById('entrada').value.trim();
      if (!texto) return;
      mostrarMensaje('Tu', texto, 'usuario');
      document.getElementById('entrada').value = '';
      const respuesta = await llamarIA(texto);
      mostrarMensaje('Bot', respuesta, 'bot');
    }

    // Muestra un mensaje en el chat
    function mostrarMensaje(quien, texto, clase) {
      const chat = document.getElementById('chat');
      chat.innerHTML += '<p class="' + clase + '"><b>' + quien + ':</b> ' + texto + '</p>';
      chat.scrollTop = chat.scrollHeight;
    }

    // Esta funcion se reemplaza en la Sesion 2 con la IA real
    const API_KEY = "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";  // <-- Pega aqui la clave que da la profesora

    async function llamarIA(mensaje) {
      try {
        const respuesta = await fetch(
          "https://api.openai.com/v1/chat/completions",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": "Bearer " + API_KEY
            },
            body: JSON.stringify({
              model: "gpt-3.5-turbo",
              messages: [
                { role: "system", content: personalidad },
                { role: "user",   content: mensaje }
              ],
              max_tokens: 200
            })
          }
        );
        const datos = await respuesta.json();
        return datos.choices[0].message.content;
      } catch (error) {
        return "Lo siento, hay un problema de conexion. Intenta de nuevo.";
      }
    }

    // Permite enviar con la tecla Enter
    document.getElementById('entrada').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') enviar();
    });
  </script>
</body>
</html>
